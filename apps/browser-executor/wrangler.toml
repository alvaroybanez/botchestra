name = "botchestra-browser-executor"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "4706cd867d3963eb776c8a009005861b"

[observability]
enabled = true

# R2 bucket for run artifacts (screenshots, manifests, reports)
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "botchestra-artifacts"

# Durable Object for browser lease concurrency management
[[durable_objects.bindings]]
name = "BROWSER_LEASE"
class_name = "BrowserLeaseDO"

[[migrations]]
tag = "v1"
new_classes = ["BrowserLeaseDO"]

# Browser Rendering binding (requires Workers Paid plan)
[browser]
binding = "BROWSER"

# KV namespace for caching and session data
[[kv_namespaces]]
binding = "KV"
id = "9ddc76aba9974aea88d54ef14ae8ab4f"
preview_id = "a0b97c2afb3645f5b859637b5ceafed4"

[vars]
BROWSER_CONCURRENCY_HARD_CAP = "30"
